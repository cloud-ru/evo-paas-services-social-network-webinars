version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_network
    ports:
      - '5432:5432'

  minio:
    image: minio/minio
    restart: always
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - auth
      - user
      - post
      - message
      - file
      - email

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    env_file:
      - .env
    ports:
      - '3001:3001'
    depends_on:
      - postgres

  email:
    build:
      context: .
      dockerfile: apps/email/Dockerfile
    env_file:
      - .env
    ports:
      - '3002:3002'

  user:
    build:
      context: .
      dockerfile: apps/user/Dockerfile
    env_file:
      - .env
    ports:
      - '3003:3003'
    depends_on:
      - postgres

  message:
    build:
      context: .
      dockerfile: apps/message/Dockerfile
    env_file:
      - .env
    ports:
      - '3004:3004'
    depends_on:
      - postgres

  post:
    build:
      context: .
      dockerfile: apps/post/Dockerfile
    env_file:
      - .env
    ports:
      - '3005:3005'
    depends_on:
      - postgres

  file:
    build:
      context: .
      dockerfile: apps/file/Dockerfile
    env_file:
      - .env
    ports:
      - '3006:3006'
    depends_on:
      - minio

volumes:
  postgres_data:
  minio_data:
