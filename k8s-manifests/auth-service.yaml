apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: social-network
  labels:
    app: social-network-webinars
    component: auth
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: social-network-webinars
    component: auth
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: social-network
  labels:
    app: social-network-webinars
    component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-network-webinars
      component: auth
  template:
    metadata:
      labels:
        app: social-network-webinars
        component: auth
    spec:
      containers:
        - name: auth
          image: evo-social-network-sedg1l.cr.cloud.ru/social-network-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: AUTH_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: AUTH_PORT
            - name: AUTH_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: AUTH_HOST
            - name: AUTH_DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: AUTH_DATABASE_URL
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_DB
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: JWT_EXPIRATION
            - name: REFRESH_TOKEN_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: REFRESH_TOKEN_EXPIRATION
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 5
            periodSeconds: 5