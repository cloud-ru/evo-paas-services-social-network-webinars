apiVersion: v1
kind: ConfigMap
metadata:
  name: social-network-config
  namespace: social-network
  labels:
    app: social-network-webinars
data:
  # API Gateway Configuration
  API_GATEWAY_PORT: "3000"
  API_GATEWAY_URL: "http://api-gateway:3000"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:3007,http://frontend:3000,http://social-network.local,http://api.social-network.local"
  
  # Service Ports
  AUTH_PORT: "3001"
  AUTH_HOST: "auth"
  
  EMAIL_PORT: "3002"
  EMAIL_HOST: "email"
  EMAIL_DEV_MODE: "true"
  
  USER_PORT: "3003"
  USER_HOST: "user"
  
  MESSAGE_PORT: "3004"
  MESSAGE_HOST: "message"
  
  POST_PORT: "3005"
  POST_HOST: "post"
  
  FILE_PORT: "3006"
  FILE_HOST: "file"
  
  # Database Configuration
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "social_network"
  
  # MinIO Configuration
  MINIO_HOST: "minio"
  MINIO_PORT: "9000"
  S3_REGION: "us-east-1"
  S3_BUCKET: "social-network"
  S3_ENDPOINT: "http://minio:9000"
  S3_PUBLIC_URL: "http://minio:9000"
  
  # JWT Configuration
  JWT_EXPIRATION: "15m"
  REFRESH_TOKEN_EXPIRATION: "7d"
  
  # SMTP Configuration
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "user@example.com"
  SMTP_FROM: "No Reply <noreply@example.com>"