apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: social-network
  labels:
    app: social-network-webinars
    component: minio
spec:
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: minio-api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: minio-console
  selector:
    app: social-network-webinars
    component: minio
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: social-network
  labels:
    app: social-network-webinars
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: social-network-webinars
      component: minio
  template:
    metadata:
      labels:
        app: social-network-webinars
        component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          ports:
            - containerPort: 9000
              name: minio-api
            - containerPort: 9001
              name: minio-console
          args:
            - server
            - --console-address
            - ":9001"
            - /data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: minio-storage
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: minio-storage
        labels:
          app: social-network-webinars
          component: minio
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: cloudru-ssd
        resources:
          requests:
            storage: 20Gi