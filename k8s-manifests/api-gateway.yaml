apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: social-network
  labels:
    app: social-network-webinars
    component: api-gateway
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: social-network-webinars
    component: api-gateway
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: social-network
  labels:
    app: social-network-webinars
    component: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-network-webinars
      component: api-gateway
  template:
    metadata:
      labels:
        app: social-network-webinars
        component: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: registry_name.cr.cloud.ru/social-network-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: API_GATEWAY_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: API_GATEWAY_PORT
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: API_GATEWAY_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: CORS_ORIGINS
            - name: AUTH_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: AUTH_HOST
            - name: AUTH_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: AUTH_PORT
            - name: EMAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: EMAIL_PORT
            - name: USER_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: USER_HOST
            - name: USER_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: USER_PORT
            - name: MESSAGE_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: MESSAGE_HOST
            - name: MESSAGE_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: MESSAGE_PORT
            - name: POST_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POST_HOST
            - name: POST_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POST_PORT
            - name: FILE_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: FILE_HOST
            - name: FILE_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: FILE_PORT
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5