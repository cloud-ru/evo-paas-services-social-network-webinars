apiVersion: v1
kind: Service
metadata:
  name: message
  namespace: social-network
  labels:
    app: social-network-webinars
    component: message
spec:
  ports:
    - port: 3004
      targetPort: 3004
      protocol: TCP
      name: http
  selector:
    app: social-network-webinars
    component: message
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message
  namespace: social-network
  labels:
    app: social-network-webinars
    component: message
spec:
  replicas: 2
  selector:
    matchLabels:
      app: social-network-webinars
      component: message
  template:
    metadata:
      labels:
        app: social-network-webinars
        component: message
    spec:
      containers:
        - name: message
          image: registry_name.cr.cloud.ru/social-network-message:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: MESSAGE_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: MESSAGE_PORT
            - name: MESSAGE_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: MESSAGE_HOST
            - name: MESSAGE_DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: MESSAGE_DATABASE_URL
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_DB
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3014
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3014
            initialDelaySeconds: 5
            periodSeconds: 5