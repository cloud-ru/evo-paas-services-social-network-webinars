apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: social-network
  labels:
    app: social-network-webinars
    component: user
spec:
  ports:
    - port: 3003
      targetPort: 3003
      protocol: TCP
      name: http
  selector:
    app: social-network-webinars
    component: user
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: social-network
  labels:
    app: social-network-webinars
    component: user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-network-webinars
      component: user
  template:
    metadata:
      labels:
        app: social-network-webinars
        component: user
    spec:
      containers:
        - name: user
          image: evo-social-network-sedg1l.cr.cloud.ru/social-network-user:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: USER_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: USER_PORT
            - name: USER_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: USER_HOST
            - name: USER_DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: USER_DATABASE_URL
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: social-network-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: social-network-config
                  key: POSTGRES_DB
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "512Mi"
            limits:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 5
            periodSeconds: 5